name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: focalors-linux-x86_64
            binary_path: target/release/focalors
            archive_name: focalors-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: focalors-windows-x86_64
            binary_path: target/release/focalors.exe
            archive_name: focalors-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build portable release binary (Linux)
        if: runner.os == 'Linux'
        run: cargo rustc --release --locked --bin focalors -- -C target-cpu=x86-64

      - name: Build portable release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo rustc --release --locked --bin focalors -- -C target-cpu=x86-64

      - name: Assemble release bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp ${{ matrix.binary_path }} dist/${{ matrix.artifact_name }}/
          cp README.md dist/${{ matrix.artifact_name }}/
          cp CONTRIBUTING.md dist/${{ matrix.artifact_name }}/
          cp LICENSE dist/${{ matrix.artifact_name }}/
          tar -czf ${{ matrix.archive_name }} -C dist ${{ matrix.artifact_name }}

      - name: Assemble release bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact_name }} | Out-Null
          Copy-Item ${{ matrix.binary_path }} dist/${{ matrix.artifact_name }}/
          Copy-Item README.md dist/${{ matrix.artifact_name }}/
          Copy-Item CONTRIBUTING.md dist/${{ matrix.artifact_name }}/
          Copy-Item LICENSE dist/${{ matrix.artifact_name }}/
          Compress-Archive -Path dist/${{ matrix.artifact_name }} -DestinationPath ${{ matrix.archive_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Attach archive to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
          generate_release_notes: true